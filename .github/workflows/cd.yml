name: CD - Build and Deploy

on:
  workflow_run:
    workflows: ["CI - Linting and Validation"]
    branches: [main, branch_fa]
    types: [completed]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: practica-ci-cd

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Set image tag variables
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Processing image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: processing
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Training image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: train
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:train-latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:train-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
            
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install boto3 and sagemaker
        run: pip install boto3 sagemaker
        
      - name: Launch SageMaker Processing Job
        run: |
          python scripts/launch_processing_job.py \
            --image ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-latest \
            --role ${{ secrets.SAGEMAKER_ROLE_ARN }} \
            --input-s3 s3://${{ secrets.S3_BUCKET_NAME }}/data/raw/ \
            --output-s3 s3://${{ secrets.S3_BUCKET_NAME }}/data/processed/ \
            --instance-type ml.t3.medium
            
      - name: Launch SageMaker Training Job 
        run: |
          python scripts/launch_training_job.py \
            --image ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:train-latest \
            --role ${{ secrets.SAGEMAKER_ROLE_ARN }} \
            --input-s3 s3://${{ secrets.S3_BUCKET_NAME }}/data/processed/ \
            --output-s3 s3://${{ secrets.S3_BUCKET_NAME }}/models/ \
            --instance-type ml.m5.large
