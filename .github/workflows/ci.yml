name: CI - Linting and Validation

on:
  push:
    branches: [ main, develop, branch_fa]
  pull_request:
    branches: [ main, develop, branch_fa]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with pylint
      run: |
        pylint src/
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Download Data from S3
      run: |
        mkdir -p data/raw
        # Assuming the bucket has a 'data/raw/' prefix
        aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/data/raw/ data/raw/ --recursive
        # Fallback if no data is found (so the action doesn't fail if the bucket is empty during testing)
        if [ -z "$(ls -A data/raw)" ]; then
           echo "No data found in S3, falling back to download_data.py to populate it for the first time..."
           python scripts/download_data.py
           # Upload it back so future runs find it
           aws s3 cp data/raw/ s3://${{ secrets.S3_BUCKET_NAME }}/data/raw/ --recursive
        fi
    
    - name: Train Model
      run: |
        python src/train.py --model random_forest
    
    - name: Evaluate Model
      run: |
        python src/evaluate.py --model titanic_model_random_forest.pkl --use-test
        
    - name: Enforce Accuracy > 0.6
      run: |
        ACCURACY=$(python -c "import json; print(json.load(open('reports/evaluation_results.json', encoding='utf-8'))['metrics']['accuracy'])")
        echo "Model accuracy: $ACCURACY"
        if [ 1 -eq "$(echo "${ACCURACY} <= 0.6" | bc)" ]; then
          echo "Accuracy ${ACCURACY} is not greater than 0.6. Failing CI."
          exit 1
        fi
        echo "Accuracy is > 0.6. CI passed."
