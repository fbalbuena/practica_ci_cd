name: SageMaker Pipeline

on:
  workflow_run:
    workflows: ["Docker Build and Publish to ECR"]
    branches: [main, branch_fa]
    types: [completed]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: practica-ci-cd

jobs:
  run-sagemaker-jobs:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install boto3 and sagemaker
        run: pip install boto3 sagemaker

      - name: Launch SageMaker Processing Job
        id: processing
        run: |
          python scripts/launch_processing_job.py \
            --image ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-latest \
            --role ${{ secrets.SAGEMAKER_ROLE_ARN }} \
            --input-s3 s3://${{ secrets.S3_BUCKET_NAME }}/data/raw/ \
            --output-s3 s3://${{ secrets.S3_BUCKET_NAME }}/data/processed/ \
            --instance-type ml.t3.medium
            
      - name: Launch SageMaker Training Job 
        id: training
        run: |
          python scripts/launch_training_job.py \
            --image ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:train-latest \
            --role ${{ secrets.SAGEMAKER_ROLE_ARN }} \
            --input-s3 s3://${{ secrets.S3_BUCKET_NAME }}/data/processed/ \
            --output-s3 s3://${{ secrets.S3_BUCKET_NAME }}/models/ \
            --instance-type ml.m5.large

      - name: Create summary
        if: always()
        run: |
          echo "## SageMaker Pipeline 🔬" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Image | Instance |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Processing | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:processing-latest\` | \`ml.t3.medium\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Training | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:train-latest\` | \`ml.m5.large\` |" >> $GITHUB_STEP_SUMMARY
